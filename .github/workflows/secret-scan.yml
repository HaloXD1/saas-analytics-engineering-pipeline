name: Secret Scan

on:
  push:
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Scan tracked files
        run: |
          python - <<'PY'
          import re
          import subprocess
          from pathlib import Path

          patterns = [
              re.compile(r"AKIA[0-9A-Z]{16}"),
              re.compile(r"-----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----"),
              re.compile(r"(?i)(api[_-]?key|secret|token)\s*[:=]\s*['\"][A-Za-z0-9_\-]{24,}['\"]"),
          ]
          findings = []
          for file_name in subprocess.check_output(["git", "ls-files"], text=True).splitlines():
              path = Path(file_name)
              if path.suffix.lower() in {".png", ".pdf", ".docx"}:
                  continue
              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              if any(pattern.search(text) for pattern in patterns):
                  findings.append(file_name)
          if findings:
              raise SystemExit("Potential secrets found:\n" + "\n".join(findings))
          print("No obvious secrets found.")
          PY
