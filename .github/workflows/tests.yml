name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format
        run: ruff format --check .

      - name: Tests
        run: pytest --cov=src/saas_analytics --cov-report=term-missing --cov-fail-under=85

      - name: Smoke
        run: |
          saas-analytics generate-data
          saas-analytics run-pipeline --mode full
          saas-analytics run-pipeline --mode incremental
          saas-analytics export-marts
          saas-analytics validate-contracts
          saas-analytics health-check

      - name: Dashboard bootstrap smoke
        run: python -c "from saas_analytics.bootstrap import ensure_demo_outputs; ensure_demo_outputs()"
